<div class="auth-page">
  <div class="auth-card">
    <h1>Welcome Back</h1>

    <input
      type="text"
      [(ngModel)]="username"
      placeholder="Username"
    />

    <input
      type="password"
      [(ngModel)]="password"
      placeholder="Password"
    />

    <button class="main-btn" (click)="login()">Login</button>

    <p class="bottom-text">
      Don’t have an account?
      <a routerLink="/register">Register</a>
    </p>
  </div>
</div>
