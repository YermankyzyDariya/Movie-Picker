<div *ngIf="movie" class="detail-container">

  <img [src]="fixImage(movie.image)" />

  <div class="info">
    <h1>{{ movie.title }}</h1>

    <p><b>Genres:</b> {{ getGenres(movie.genres) }}</p>
    <p><b>Year:</b> {{ movie.year }}</p>
    <p><b>Description:</b> {{ movie.description }}</p>

  </div>

</div>
